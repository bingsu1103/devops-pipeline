apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: devops-app
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80 # Service port (cổng nội bộ K8s)
      targetPort: 7070 # Cổng thực tế của App trong container
  type: ClusterIP # Chỉ truy cập bên trong cluster hoặc qua Ingress
