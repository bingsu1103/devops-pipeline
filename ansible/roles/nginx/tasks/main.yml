---
- name: Install Nginx
  dnf:
    name: nginx
    state: present

- name: Install Certbot and Python dependencies
  dnf:
    name:
      - python3-certbot-nginx
    state: present
  when: ssl_enabled | default(false) | bool

- name: Deploy Nginx Base Config (without SSL)
  template:
    src: app.conf.j2
    dest: /etc/nginx/conf.d/app.conf
  vars:
    ssl_enabled: false
    render_ssl: false
  notify: restart nginx

- name: Validate Nginx config (base)
  command: nginx -t
  changed_when: false

- name: Ensure Nginx is started
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Force restart Nginx to apply base config
  meta: flush_handlers

- name: Generate SSL certification with Certbot
  command: >
    certbot certonly --nginx
    -d {{ domain_name }}
    --non-interactive
    --agree-tos
    --email {{ certbot_email | default('admin@example.com') }}
  args:
    creates: "/etc/letsencrypt/live/{{ domain_name }}/fullchain.pem"
  when: ssl_enabled | default(false) | bool

- name: Re-deploy Nginx Config (with SSL)
  template:
    src: app.conf.j2
    dest: /etc/nginx/conf.d/app.conf
  when: ssl_enabled | default(false) | bool
  vars:
    render_ssl: true
  notify: restart nginx

- name: Validate Nginx config (SSL)
  command: nginx -t
  changed_when: false
  when: ssl_enabled | default(false) | bool

- name: Install certbot renew systemd service
  copy:
    dest: /etc/systemd/system/certbot-renew.service
    mode: "0644"
    content: |
      [Unit]
      Description=Renew Let's Encrypt certificates

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/certbot renew --quiet --deploy-hook "systemctl reload nginx"
  when: ssl_enabled | default(false) | bool

- name: Install certbot renew systemd timer
  copy:
    dest: /etc/systemd/system/certbot-renew.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Run certbot renew twice daily

      [Timer]
      OnCalendar=*-*-* 03,15:00:00
      RandomizedDelaySec=300
      Persistent=true

      [Install]
      WantedBy=timers.target
  when: ssl_enabled | default(false) | bool

- name: Enable and start certbot renew timer
  systemd:
    name: certbot-renew.timer
    state: started
    enabled: yes
    daemon_reload: yes
  when: ssl_enabled | default(false) | bool
