[backend]
backend_server ansible_host=YOUR_BACKEND_IP ansible_user=ec2-user

[backend:vars]
db_host=YOUR_RDS_ENDPOINT
db_name=dev_inventory_db
db_username=dbadmin
db_password=REPLACE_WITH_YOUR_DB_PASSWORD

[frontend]
frontend_server ansible_host=YOUR_FRONTEND_IP ansible_user=ec2-user

[all:vars]
ansible_ssh_private_key_file=~/.ssh/aws_key_pair.pem
ansible_python_interpreter=/usr/bin/python3
