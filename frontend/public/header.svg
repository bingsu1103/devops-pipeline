<svg width="450" height="100" viewBox="0 0 450 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gemini-inspired Linear Gradient -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" /> <!-- Blue -->
      <stop offset="40%" style="stop-color:#9B72F3;stop-opacity:1" /> <!-- Purple -->
      <stop offset="70%" style="stop-color:#E96C89;stop-opacity:1" /> <!-- Pink/Coral -->
      <stop offset="100%" style="stop-color:#FDBA74;stop-opacity:1" /> <!-- Soft Orange -->
    </linearGradient>
    
    <!-- Outer Glow for "Shininess" -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Subtle Reflection / Shine Overlay -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:white;stop-opacity:0" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <text x="50%" y="65" font-family="'Segoe UI', 'SF Pro Display', Roboto, sans-serif" font-size="54" font-weight="950" fill="url(#grad1)" filter="glow" text-anchor="middle" letter-spacing="-1.5">
    DevOps Pipeline
  </text>
  
  <!-- Overlay text for a glass/shine effect -->
  <text x="50%" y="65" font-family="'Segoe UI', 'SF Pro Display', Roboto, sans-serif" font-size="54" font-weight="950" fill="url(#shine)" text-anchor="middle" letter-spacing="-1.5">
    DevOps Pipeline
  </text>
</svg>
